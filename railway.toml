# Deploy the research fork as a Docker service on Railway.
# Add managed Postgres + Redis in the same project, then wire env vars
# (see docs/deploy-railway.md).

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"

[deploy]
healthcheckPath = "/api/v2/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
